<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Covenant Wealth Australian Financial Planner" />
    <title>Covenant Wealth | Financial Planner</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { width: 100%; min-height: 100vh; margin: 0; padding: 0; }

      /* ── Mobile alignment fix ────────────────────────────────────────────
         Tabs use inline `gridTemplateColumns: "1fr 1fr"` / "1fr 1fr 1fr" all over the
         place (111+ instances). On iPhones (≤640px) those grids overflow and
         label/box/checkbox alignment breaks. Force every inline-styled grid to a
         single column on small viewports so cards stack cleanly. Inline styles
         normally win the cascade — `!important` is required to override them.
         The attribute selector matches React's serialized `grid-template-columns`.
      */
      @media (max-width: 640px) {
        [style*="grid-template-columns"] {
          grid-template-columns: 1fr !important;
        }
        /* iOS Safari zooms in on focus whenever an input's font-size is < 16px,
           which shifts the layout and visually misaligns labels. Force 16px on
           form controls only on small viewports. */
        input, select, textarea {
          font-size: 16px !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
